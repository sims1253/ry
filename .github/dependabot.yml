version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # The @1.88 pin in ci.yml is the MSRV job: it deliberately tests the
      # MINIMUM supported Rust version, so version bumps are never wanted.
      # (Dependabot also proposes dtolnay branches for unreleased toolchains
      # -- 1.100 existed as a branch before the toolchain was released,
      # which made the bump PR fail with a rustup 404.)
      - dependency-name: dtolnay/rust-toolchain
