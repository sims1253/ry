name: Typeshed bump

# Sync the vendored typeshed from the latest r-typeshed tag and push a
# branch when it differs. A maintainer opens the PR manually. Mirrors ty's
# model: stubs are build-time inputs, refreshed through review, never fetched
# at runtime.

on:
  schedule:
    - cron: "17 5 * * 1" # Mondays 05:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check out latest r-typeshed tag
        run: |
          git clone --quiet https://github.com/sims1253/r-typeshed /tmp/r-typeshed
          tag="$(git -C /tmp/r-typeshed describe --tags --abbrev=0)"
          git -C /tmp/r-typeshed checkout --quiet "$tag"
          echo "TYPESHED_TAG=$tag" >> "$GITHUB_ENV"
      - name: Sync and validate vendored typeshed
        run: scripts/sync_typeshed.sh /tmp/r-typeshed
      - name: Push bump branch on drift
        run: |
          if git diff --quiet; then
            echo "Vendored typeshed is already current."
            exit 0
          fi

          branch=bot/typeshed-bump
          remote_sha=$(git ls-remote --heads origin "refs/heads/$branch" | cut -f1)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$branch"
          git add crates/ry-typeshed/vendor
          git commit -m "Sync vendored typeshed to r-typeshed $TYPESHED_TAG"
          git push --force-with-lease="refs/heads/$branch:${remote_sha:-}" origin "$branch"

          compare_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/main...$branch?expand=1"
          echo "Open the typeshed bump PR manually: $compare_url"
          {
            echo "### Typeshed bump ready"
            echo
            echo "Validation passed and \`$branch\` was updated."
            echo "[Open the pull request]($compare_url)."
          } >> "$GITHUB_STEP_SUMMARY"
