name: Ecosystem regression

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ecosystem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      # run.sh writes its reports with Rscript (jsonlite for the ry JSON
      # output); snapshots themselves are hermetic via
      # RY_NO_INSTALLED_LIBRARIES, so no other R packages are needed.
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R packages (report writer)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::jsonlite
      - uses: actions/cache@v6
        with:
          path: |
            ecosystem/.cache
            target
          key: ecosystem-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'ecosystem/packages.txt') }}
          restore-keys: |
            ecosystem-${{ runner.os }}-
      - name: Build release binary
        run: cargo build --release --locked -p ry-cli --bin ry
      - name: Check ecosystem snapshots
        run: ecosystem/run.sh --check
