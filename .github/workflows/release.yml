name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: rustfmt
        run: cargo fmt --all -- --check

  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      name: ${{ steps.meta.outputs.name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      make_latest: ${{ steps.meta.outputs.make_latest }}
    steps:
      - id: meta
        name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail

          tag="$GITHUB_REF_NAME"
          version="${tag#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=ry $tag" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: [verify, metadata]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: ry-${{ github.ref_name }}-x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-26-intel
            target: x86_64-apple-darwin
            package: ry-${{ github.ref_name }}-x86_64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: ry-${{ github.ref_name }}-x86_64-pc-windows-msvc
            ext: zip
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        shell: bash
        run: cargo build --release --locked -p ry-cli --bin ry --target "${{ matrix.target }}"
      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          staging="${{ matrix.package }}"
          archive="${{ matrix.package }}.${{ matrix.ext }}"
          mkdir -p "$staging"
          cp README.md LICENSE "$staging/"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/ry.exe" "$staging/"
            7z a "$archive" "./$staging/*"
          else
            cp "target/${{ matrix.target }}/release/ry" "$staging/"
            tar -czf "$archive" "$staging"
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ matrix.package }}.${{ matrix.ext }}
            ${{ matrix.package }}.${{ matrix.ext }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: ${{ needs.metadata.outputs.name }}
          generate_release_notes: true
          prerelease: ${{ needs.metadata.outputs.prerelease }}
          make_latest: ${{ needs.metadata.outputs.make_latest }}
          files: |
            dist/*
          fail_on_unmatched_files: true
