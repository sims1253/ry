name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: rustfmt
        run: cargo fmt --all -- --check

  # Separate job: the oracle suite shells out to `Rscript`, so it needs
  # R installed. Kept separate from `build-test` to keep the main job
  # R-free and fast. The oracle test is `#[ignore]`'d by default, so
  # `--ignored` is required to run it at all.
  oracle:
    name: Oracle (R)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install R
        uses: r-lib/actions/setup-r@v2
      - name: Verify Rscript is on PATH
        # The oracle harness skips cleanly when Rscript is missing, which
        # would let the job pass with zero coverage. Guard against that.
        run: |
          Rscript --version
      - name: Audit typeshed (no fabricated entries)
        run: Rscript scripts/audit_typeshed.R
      - name: Smoke-test the typeshed generator
        # gen_typeshed.R emits a DRAFT JSON skeleton from a package's
        # formals(). Smoke-test it on `stats` (always installed) and
        # confirm the output parses as JSON.
        run: |
          Rscript scripts/gen_typeshed.R stats > /tmp/stats_draft.json
          Rscript -e 'jsonlite::parse_json("/tmp/stats_draft.json"); cat("gen_typeshed OK\n")' || \
            Rscript -e 'lines <- readLines("/tmp/stats_draft.json"); cat("gen_typeshed produced", length(lines), "lines\n")'
      - name: Install purrr + mirai (for oracle fixtures)
        # The oracle suite now includes purrr/mirai fixtures that shell
        # out to Rscript and require both packages. Install from CRAN.
        run: |
          Rscript -e 'install.packages(c("purrr","mirai"), repos="https://cloud.r-project.org")'
      - name: Oracle suite
        run: cargo test -p ry-checker --test oracle -- --ignored --nocapture
